version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: lifetime_value
        tests:
          - not_null

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: price_usd
        tests:
          - not_null

  - name: dim_dates
    columns:
      - name: date_id
        tests:
          - unique
          - not_null

  - name: fct_sales
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: total_usd
        tests:
          - not_null
